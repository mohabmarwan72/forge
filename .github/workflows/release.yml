name: Release

# Builds Forge for macOS, Windows, and Linux on every tag push (e.g. v0.2.2)
# and attaches all bundles to a GitHub Release.

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            rust_target: aarch64-apple-darwin
            bundles: dmg
          - platform: windows-latest
            rust_target: x86_64-pc-windows-msvc
            bundles: msi,nsis
          - platform: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
            bundles: appimage,deb

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install Linux system deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxss-dev \
            patchelf

      - name: Install JS deps
        run: npm ci

      - name: Build & bundle
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Forge ${{ github.ref_name }}"
          releaseBody: "Auto-generated release. See commits for changes."
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.rust_target }} --bundles ${{ matrix.bundles }}
